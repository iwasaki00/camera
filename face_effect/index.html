<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>face_effect Camera</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">face_effect</p>
      <h1>顔エフェクトカメラ</h1>
      <p class="lead">
        iPhone のインカメラ映像に顔ランドマークを重ねて、
        白目、つながり眉、数式、おそろしい子の 4 種類を切り替えられる簡易フィルターです。
      </p>
    </header>

    <section class="viewer-card">
      <div class="canvas-wrap">
        <canvas id="outputCanvas" width="720" height="960" aria-label="顔エフェクトカメラのプレビュー"></canvas>
        <video id="cameraVideo" playsinline muted></video>
      </div>

      <div class="status-panel">
        <p id="statusBadge" class="status-badge" data-state="idle">待機中</p>
        <p id="message" class="message">HTTPS またはローカルサーバー上で「カメラ開始」を押してください。</p>
        <p id="errorMessage" class="error-message" hidden></p>
      </div>

      <div class="controls">
        <div class="effect-picker" role="group" aria-label="エフェクト選択">
          <button class="effect-button is-active" type="button" data-effect="white-eye">白目</button>
          <button class="effect-button" type="button" data-effect="unibrow">つながり眉</button>
          <button class="effect-button" type="button" data-effect="equations">数式</button>
          <button class="effect-button" type="button" data-effect="osoroshii">おそろしい子</button>
        </div>
        <button id="startButton" class="start-button" type="button">カメラ開始</button>
      </div>
    </section>

    <section class="notes">
      <h2>使い方</h2>
      <ol>
        <li>iPhone でこのページを開く</li>
        <li>上のボタンでエフェクトを選ぶ</li>
        <li>「カメラ開始」を押してカメラ許可を与える</li>
        <li>おそろしい子モードでは、手を顎に近づけると演出が発動する</li>
      </ol>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
