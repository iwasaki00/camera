<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Menu</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f7f1e8 0%, #e8ddd1 100%);
      color: #1f1a16;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    section {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(31, 26, 22, 0.12);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 18px 36px rgba(70, 45, 31, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.1rem;
    }

    p {
      line-height: 1.7;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li + li {
      margin-top: 18px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 16px;
      background: #c8562d;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Camera Menu</h1>
      <p>`camera` 配下の iPhone 向けカメラ実験を選ぶメニューです。</p>
      <ul>
        <li>
          <strong>sub001</strong>
          <p>既存のカメラ検証ページです。</p>
          <a href="./sub001/index.html">sub001 を開く</a>
        </li>
        <li>
          <strong>sub002</strong>
          <p>インカメラ映像の両目に白目フィルターを重ねる既存版です。</p>
          <a href="./sub002/index.html">sub002 を開く</a>
        </li>
        <li>
          <strong>face_effect</strong>
          <p>白目、つながり眉、頭上の数式を切り替えられる顔エフェクトカメラです。</p>
          <a href="./face_effect/index.html">face_effect を開く</a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
