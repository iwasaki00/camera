name: Deploy camera apps to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
      - "face_effect/**"
      - "henface_maker/**"
      - ".github/workflows/deploy-face-effect-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install face_effect dependencies
        working-directory: face_effect
        run: npm install

      - name: Build face_effect
        working-directory: face_effect
        run: npm run build

      - name: Install henface_maker dependencies
        working-directory: henface_maker
        run: npm install

      - name: Build henface_maker
        working-directory: henface_maker
        run: npm run build

      - name: Assemble Pages site
        shell: bash
        run: |
          mkdir -p site/face_effect
          mkdir -p site/henface_maker
          cp index.html site/index.html
          cp -r face_effect/dist/. site/face_effect/
          cp -r henface_maker/dist/. site/henface_maker/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
