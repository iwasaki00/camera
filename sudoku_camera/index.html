<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sudoku OCR Camera Test</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">ナンプレ OCR テスト</p>
      <h1>iPhoneカメラで数字OCRを検証</h1>
      <p class="lead">
        ナンプレ問題を撮影し、数字がどこまで読めるかを確認するための最小構成アプリです。
      </p>
    </header>

    <section class="panel">
      <h2>1. カメラ開始</h2>
      <video id="cameraPreview" class="preview" playsinline autoplay muted></video>
      <button id="startCameraButton" class="primary" type="button">カメラ開始</button>
      <button id="captureButton" class="secondary" type="button" disabled>撮影</button>
    </section>

    <section class="panel">
      <h2>2. 撮影画像</h2>
      <canvas id="captureCanvas" class="captureCanvas" aria-label="撮影画像"></canvas>
    </section>

    <section class="panel">
      <h2>3. OCR前処理画像</h2>
      <canvas id="processedCanvas" class="captureCanvas" aria-label="OCR前処理画像"></canvas>
      <button id="runOcrButton" class="primary" type="button" disabled>OCR実行</button>
      <p id="statusMessage" class="status" role="status" aria-live="polite">
        1. カメラ開始 → 2. 撮影 → 3. OCR実行 の順で試してください。
      </p>
    </section>

    <section class="panel results">
      <h2>OCR結果</h2>
      <div class="resultBlock">
        <h3>生OCR結果</h3>
        <pre id="rawOcrResult" class="resultText">まだ実行していません。</pre>
      </div>
      <div class="resultBlock">
        <h3>数字だけ抽出結果</h3>
        <pre id="digitsOnlyResult" class="resultText">まだ実行していません。</pre>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
