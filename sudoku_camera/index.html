<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sudoku OCR Camera Test</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">Sudoku OCR Test</p>
      <h1>Camera to OCR only</h1>
      <p class="lead">
        Test whether iPhone camera images of a Sudoku puzzle can be read as digits.
      </p>
    </header>

    <section class="panel">
      <h2>1. Start camera</h2>
      <video id="cameraPreview" class="preview" playsinline autoplay muted></video>
      <button id="startCameraButton" class="primary" type="button">Start camera</button>
    </section>

    <section class="panel">
      <h2>2. Capture image</h2>
      <canvas id="captureCanvas" class="captureCanvas" aria-label="Captured image preview"></canvas>
      <button id="captureButton" class="secondary" type="button" disabled>Capture</button>
    </section>

    <section class="panel">
      <h2>3. Run OCR</h2>
      <button id="runOcrButton" class="primary" type="button" disabled>Run OCR</button>
      <p id="statusMessage" class="status" role="status" aria-live="polite">
        Follow this order: Start camera -> Capture -> Run OCR
      </p>
    </section>

    <section class="panel results">
      <h2>OCR results</h2>
      <div class="resultBlock">
        <h3>Raw OCR</h3>
        <pre id="rawOcrResult" class="resultText">Not run yet.</pre>
      </div>
      <div class="resultBlock">
        <h3>Digits only</h3>
        <pre id="digitsOnlyResult" class="resultText">Not run yet.</pre>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
