<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>sub002 White Eye Camera</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">sub002</p>
      <h1>白目カメラ</h1>
      <p class="lead">iPhone のインカメラ映像に、顔ランドマークを使って白い目を重ねる簡易フィルターです。</p>
    </header>

    <section class="viewer-card">
      <div class="canvas-wrap">
        <canvas id="outputCanvas" width="720" height="960" aria-label="カメラプレビュー"></canvas>
        <video id="cameraVideo" playsinline muted></video>
        <div id="statusBadge" class="status-badge">待機中</div>
      </div>

      <div class="controls">
        <button id="startButton" type="button">カメラ開始</button>
        <p id="message" class="message">HTTPS またはローカルサーバー経由で開いてください。</p>
      </div>
    </section>

    <section class="notes">
      <h2>使い方</h2>
      <ol>
        <li>「カメラ開始」を押す</li>
        <li>カメラ許可を許可する</li>
        <li>顔が映ると両目に白い楕円が重なります</li>
      </ol>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
