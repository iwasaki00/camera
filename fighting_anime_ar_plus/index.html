<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>格闘アニメ演出AR Plus</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <video id="camera" class="camera" playsinline muted autoplay></video>
    <canvas id="overlay" class="overlay"></canvas>

    <div class="scoreboard" aria-label="score">
      <div class="player-score player-a">
        <span>P1</span>
        <meter id="p1Hp" min="0" max="100" value="100"></meter>
      </div>
      <div class="player-score player-b">
        <span>P2</span>
        <meter id="p2Hp" min="0" max="100" value="100"></meter>
      </div>
    </div>

    <section class="hud" aria-label="debug and controls">
      <div class="hud-row">
        <strong id="statusText" class="status">idle</strong>
        <button id="startButton" type="button">START</button>
        <button id="cameraButton" type="button" class="secondary">CAM</button>
        <button id="panelButton" type="button" class="secondary" aria-expanded="false">DEBUG</button>
      </div>

      <div id="hudBody" class="hud-body" hidden>
        <div class="debug-grid" aria-label="recognition state">
          <div class="debug-item">
            <span>poses</span>
            <strong id="poseCountValue">0</strong>
          </div>
          <div class="debug-item">
            <span>P1</span>
            <strong id="p1StateValue">lost</strong>
          </div>
          <div class="debug-item">
            <span>P2</span>
            <strong id="p2StateValue">lost</strong>
          </div>
          <div class="debug-item">
            <span>P1 hands</span>
            <strong id="p1HandsValue">--</strong>
          </div>
          <div class="debug-item">
            <span>P2 hands</span>
            <strong id="p2HandsValue">--</strong>
          </div>
          <div class="debug-item">
            <span>camera</span>
            <strong id="cameraValue">front</strong>
          </div>
        </div>

        <div class="controls" aria-label="adjustments">
          <label>
            <span>effects</span>
            <input id="effectAmount" type="range" min="20" max="160" value="100">
          </label>
          <label>
            <span>aura</span>
            <input id="auraPower" type="range" min="20" max="180" value="100">
          </label>
          <label>
            <span>speed</span>
            <input id="ballSpeed" type="range" min="40" max="180" value="100">
          </label>
          <label>
            <span>sense</span>
            <input id="sensitivity" type="range" min="20" max="100" value="70">
          </label>
          <label>
            <span>shake</span>
            <input id="shakePower" type="range" min="0" max="160" value="80">
          </label>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
